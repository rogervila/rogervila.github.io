description: |
  <p>As a Senior Backend Engineer with over 12 years of professional experience, I design and deliver cloud-native backend systems and distributed architectures that power scalable, mission-critical applications. I have worked extensively with <strong>AWS</strong> and <strong>Cloudflare</strong> to build and operate secure, high-availability services, and I bring hands-on experience with <strong>Kubernetes</strong> for container orchestration and <strong>Docker</strong> for containerised workloads across both professional and personal environments.</p>
  <p>My core expertise spans the design of <strong>secure RESTful APIs</strong> and <strong>event-driven architectures</strong> — using messaging systems such as Apache Pulsar, AWS SQS, and Redis Pub/Sub — as well as data modelling across relational databases (<strong>MySQL, PostgreSQL</strong>) and NoSQL stores (<strong>MongoDB, Redis</strong>). I have consistently delivered reliability improvements: maintaining a 99% SLA at Convelio, reducing tech debt and incidents by 20% at InfoPro Digital Automotive, and managing incidents with structured postmortem practices.</p>
  <p>I am experienced with <strong>observability and monitoring</strong> tooling, including Grafana, Datadog, and the ELK Stack, and I apply SRE principles — incident prioritisation, man-day budgets for tech maintenance, and postmortem-driven improvements — to keep production systems stable and continuously improving. I have also worked with <strong>Java</strong> and contributed to CI/CD pipelines using Jenkins.</p>
  <p>Throughout my career I have acted as a <strong>technical leader and mentor</strong>, guiding distributed remote teams across Europe and Asia, conducting design and code reviews, and raising engineering standards through automation, testing, and shared best practices.</p>
  <p>Beyond my professional work, I actively contribute to <strong>open-source software</strong>. I maintain <a rel="noopener noreferrer" target="_blank" href="https://equipment-python.vercel.app">Equipment</a>, a Python scaffolding framework used in production environments, and a collection of <a rel="noopener noreferrer" target="_blank" href="https://github.com/rogervila/agent-skills">AI agent skills</a> that I use to automate engineering workflows in my personal projects.</p>
